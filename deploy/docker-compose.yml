# SquirroFlow two-stack queue mode deployment.
#
# Orchestrator stack (port 3000): Handles orchestrator chatflows that spawn sub-chatflows.
# Sub-chatflow stack (port 3001): Handles leaf sub-chatflows only.
#
# Two separate worker pools prevent queue deadlock: orchestrator workers wait
# for sub-chatflow results, but sub-chatflow workers are in a separate pool
# that can never be starved.
#
# IMPORTANT: After deploying, update the orchestrator chatflow's "Agent as Tool"
# Base URLs in the Flowise UI from http://flowise-main:3000 to http://flowise-sub-main:3001

x-shared-env: &shared-env
    DATABASE_PATH: ${DATABASE_PATH:-/root/.flowise}
    DATABASE_TYPE: ${DATABASE_TYPE}
    DATABASE_PORT: ${DATABASE_PORT}
    DATABASE_HOST: ${DATABASE_HOST}
    DATABASE_NAME: ${DATABASE_NAME}
    DATABASE_USER: ${DATABASE_USER}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    DATABASE_SSL: ${DATABASE_SSL}
    DATABASE_SSL_KEY_BASE64: ${DATABASE_SSL_KEY_BASE64}
    SECRETKEY_STORAGE_TYPE: ${SECRETKEY_STORAGE_TYPE}
    SECRETKEY_PATH: ${SECRETKEY_PATH}
    FLOWISE_SECRETKEY_OVERWRITE: ${FLOWISE_SECRETKEY_OVERWRITE}
    SECRETKEY_AWS_ACCESS_KEY: ${SECRETKEY_AWS_ACCESS_KEY}
    SECRETKEY_AWS_SECRET_KEY: ${SECRETKEY_AWS_SECRET_KEY}
    SECRETKEY_AWS_REGION: ${SECRETKEY_AWS_REGION}
    SECRETKEY_AWS_NAME: ${SECRETKEY_AWS_NAME}
    DEBUG: ${DEBUG}
    LOG_PATH: ${LOG_PATH}
    LOG_LEVEL: ${LOG_LEVEL}
    LOG_SANITIZE_BODY_FIELDS: ${LOG_SANITIZE_BODY_FIELDS}
    LOG_SANITIZE_HEADER_FIELDS: ${LOG_SANITIZE_HEADER_FIELDS}
    TOOL_FUNCTION_BUILTIN_DEP: ${TOOL_FUNCTION_BUILTIN_DEP}
    TOOL_FUNCTION_EXTERNAL_DEP: ${TOOL_FUNCTION_EXTERNAL_DEP}
    ALLOW_BUILTIN_DEP: ${ALLOW_BUILTIN_DEP}
    STORAGE_TYPE: ${STORAGE_TYPE}
    BLOB_STORAGE_PATH: ${BLOB_STORAGE_PATH}
    S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME}
    S3_STORAGE_ACCESS_KEY_ID: ${S3_STORAGE_ACCESS_KEY_ID}
    S3_STORAGE_SECRET_ACCESS_KEY: ${S3_STORAGE_SECRET_ACCESS_KEY}
    S3_STORAGE_REGION: ${S3_STORAGE_REGION}
    S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
    S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
    GOOGLE_CLOUD_STORAGE_CREDENTIAL: ${GOOGLE_CLOUD_STORAGE_CREDENTIAL}
    GOOGLE_CLOUD_STORAGE_PROJ_ID: ${GOOGLE_CLOUD_STORAGE_PROJ_ID}
    GOOGLE_CLOUD_STORAGE_BUCKET_NAME: ${GOOGLE_CLOUD_STORAGE_BUCKET_NAME}
    GOOGLE_CLOUD_UNIFORM_BUCKET_ACCESS: ${GOOGLE_CLOUD_UNIFORM_BUCKET_ACCESS}
    AZURE_BLOB_STORAGE_CONNECTION_STRING: ${AZURE_BLOB_STORAGE_CONNECTION_STRING}
    AZURE_BLOB_STORAGE_ACCOUNT_NAME: ${AZURE_BLOB_STORAGE_ACCOUNT_NAME}
    AZURE_BLOB_STORAGE_ACCOUNT_KEY: ${AZURE_BLOB_STORAGE_ACCOUNT_KEY}
    AZURE_BLOB_STORAGE_CONTAINER_NAME: ${AZURE_BLOB_STORAGE_CONTAINER_NAME}
    NUMBER_OF_PROXIES: ${NUMBER_OF_PROXIES}
    CORS_ORIGINS: ${CORS_ORIGINS}
    IFRAME_ORIGINS: ${IFRAME_ORIGINS}
    FLOWISE_FILE_SIZE_LIMIT: ${FLOWISE_FILE_SIZE_LIMIT}
    SHOW_COMMUNITY_NODES: ${SHOW_COMMUNITY_NODES}
    DISABLE_FLOWISE_TELEMETRY: ${DISABLE_FLOWISE_TELEMETRY}
    DISABLED_NODES: ${DISABLED_NODES}
    MODEL_LIST_CONFIG_JSON: ${MODEL_LIST_CONFIG_JSON}
    JWT_AUTH_TOKEN_SECRET: ${JWT_AUTH_TOKEN_SECRET}
    JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET}
    JWT_ISSUER: ${JWT_ISSUER}
    JWT_AUDIENCE: ${JWT_AUDIENCE}
    JWT_TOKEN_EXPIRY_IN_MINUTES: ${JWT_TOKEN_EXPIRY_IN_MINUTES}
    JWT_REFRESH_TOKEN_EXPIRY_IN_MINUTES: ${JWT_REFRESH_TOKEN_EXPIRY_IN_MINUTES}
    EXPIRE_AUTH_TOKENS_ON_RESTART: ${EXPIRE_AUTH_TOKENS_ON_RESTART}
    EXPRESS_SESSION_SECRET: ${EXPRESS_SESSION_SECRET}
    PASSWORD_RESET_TOKEN_EXPIRY_IN_MINS: ${PASSWORD_RESET_TOKEN_EXPIRY_IN_MINS}
    PASSWORD_SALT_HASH_ROUNDS: ${PASSWORD_SALT_HASH_ROUNDS}
    TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET}
    SECURE_COOKIES: ${SECURE_COOKIES}
    SMTP_HOST: ${SMTP_HOST}
    SMTP_PORT: ${SMTP_PORT}
    SMTP_USER: ${SMTP_USER}
    SMTP_PASSWORD: ${SMTP_PASSWORD}
    SMTP_SECURE: ${SMTP_SECURE}
    ALLOW_UNAUTHORIZED_CERTS: ${ALLOW_UNAUTHORIZED_CERTS}
    SENDER_EMAIL: ${SENDER_EMAIL}
    LICENSE_URL: ${LICENSE_URL}
    FLOWISE_EE_LICENSE_KEY: ${FLOWISE_EE_LICENSE_KEY}
    OFFLINE: ${OFFLINE}
    INVITE_TOKEN_EXPIRY_IN_HOURS: ${INVITE_TOKEN_EXPIRY_IN_HOURS}
    WORKSPACE_INVITE_TEMPLATE_PATH: ${WORKSPACE_INVITE_TEMPLATE_PATH}
    POSTHOG_PUBLIC_API_KEY: ${POSTHOG_PUBLIC_API_KEY}
    ENABLE_METRICS: ${ENABLE_METRICS}
    METRICS_PROVIDER: ${METRICS_PROVIDER}
    METRICS_INCLUDE_NODE_METRICS: ${METRICS_INCLUDE_NODE_METRICS}
    METRICS_SERVICE_NAME: ${METRICS_SERVICE_NAME}
    METRICS_OPEN_TELEMETRY_METRIC_ENDPOINT: ${METRICS_OPEN_TELEMETRY_METRIC_ENDPOINT}
    METRICS_OPEN_TELEMETRY_PROTOCOL: ${METRICS_OPEN_TELEMETRY_PROTOCOL}
    METRICS_OPEN_TELEMETRY_DEBUG: ${METRICS_OPEN_TELEMETRY_DEBUG}
    GLOBAL_AGENT_HTTP_PROXY: ${GLOBAL_AGENT_HTTP_PROXY}
    GLOBAL_AGENT_HTTPS_PROXY: ${GLOBAL_AGENT_HTTPS_PROXY}
    GLOBAL_AGENT_NO_PROXY: ${GLOBAL_AGENT_NO_PROXY}
    CUSTOM_MCP_SECURITY_CHECK: ${CUSTOM_MCP_SECURITY_CHECK}
    CUSTOM_MCP_PROTOCOL: ${CUSTOM_MCP_PROTOCOL}
    HTTP_DENY_LIST: ${HTTP_DENY_LIST}
    HTTP_SECURITY_CHECK: ${HTTP_SECURITY_CHECK}
    PATH_TRAVERSAL_SAFETY: ${PATH_TRAVERSAL_SAFETY}
    TRUST_PROXY: ${TRUST_PROXY}
    MODE: ${MODE:-queue}
    QUEUE_REDIS_EVENT_STREAM_MAX_LEN: ${QUEUE_REDIS_EVENT_STREAM_MAX_LEN}
    REMOVE_ON_AGE: ${REMOVE_ON_AGE}
    REMOVE_ON_COUNT: ${REMOVE_ON_COUNT}
    ENABLE_BULLMQ_DASHBOARD: ${ENABLE_BULLMQ_DASHBOARD}

services:
    # =========================================================================
    # SHARED POSTGRES
    # =========================================================================

    postgres:
        image: postgres:15-alpine
        container_name: squirroflow-postgres
        restart: always
        environment:
            POSTGRES_USER: ${DATABASE_USER:-flowise}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-flowise}
            POSTGRES_DB: ${DATABASE_NAME:-flowise}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - squirroflow-orch-net
            - squirroflow-sub-net
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-flowise}']
            interval: 10s
            timeout: 5s
            retries: 5

    # =========================================================================
    # ORCHESTRATOR STACK — handles orchestrator chatflows
    # =========================================================================

    redis-orch:
        image: redis:alpine
        container_name: squirroflow-redis-orch
        volumes:
            - redis_orch_data:/data
        networks:
            - squirroflow-orch-net
        restart: always

    squirroflow-orch-main:
        image: ${SQUIRROFLOW_IMAGE:-squirroflow:latest}
        container_name: squirroflow-main
        restart: always
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${ORCH_PORT:-3000}:${ORCH_PORT:-3000}'
        volumes:
            - squirroflow_data:/root/.flowise
        environment:
            <<: *shared-env
            PORT: ${ORCH_PORT:-3000}
            APP_URL: http://squirroflow-main:${ORCH_PORT:-3000}
            QUEUE_NAME: ${ORCH_QUEUE_NAME:-squirroflow-orch-queue}
            WORKER_CONCURRENCY: ${ORCH_WORKER_CONCURRENCY:-2}
            REDIS_URL: redis://squirroflow-redis-orch:6379
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:${ORCH_PORT:-3000}/api/v1/ping']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        entrypoint: /bin/sh -c "sleep 3; pnpm start"
        depends_on:
            - redis-orch
            - postgres
        networks:
            - squirroflow-orch-net
            - squirroflow-sub-net

    squirroflow-orch-worker:
        image: ${SQUIRROFLOW_WORKER_IMAGE:-squirroflow-worker:latest}
        restart: always
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - squirroflow_data:/root/.flowise
        environment:
            <<: *shared-env
            WORKER_PORT: ${ORCH_WORKER_PORT:-5566}
            APP_URL: http://squirroflow-main:${ORCH_PORT:-3000}
            QUEUE_NAME: ${ORCH_QUEUE_NAME:-squirroflow-orch-queue}
            WORKER_CONCURRENCY: ${ORCH_WORKER_CONCURRENCY:-2}
            REDIS_URL: redis://squirroflow-redis-orch:6379
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:${ORCH_WORKER_PORT:-5566}/healthz']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        entrypoint: /bin/sh -c "node /app/healthcheck/healthcheck.js & sleep 5 && pnpm run start-worker"
        depends_on:
            - redis-orch
            - squirroflow-orch-main
        networks:
            - squirroflow-orch-net
            - squirroflow-sub-net

    # =========================================================================
    # SUB-CHATFLOW STACK — handles leaf sub-chatflows (no recursive deps)
    # =========================================================================

    redis-sub:
        image: redis:alpine
        container_name: squirroflow-redis-sub
        volumes:
            - redis_sub_data:/data
        networks:
            - squirroflow-sub-net
        restart: always

    squirroflow-sub-main:
        image: ${SQUIRROFLOW_IMAGE:-squirroflow:latest}
        container_name: squirroflow-sub-main
        restart: always
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${SUB_PORT:-3001}:${SUB_PORT:-3001}'
        volumes:
            - squirroflow_data:/root/.flowise
        environment:
            <<: *shared-env
            PORT: ${SUB_PORT:-3001}
            APP_URL: http://squirroflow-sub-main:${SUB_PORT:-3001}
            QUEUE_NAME: ${SUB_QUEUE_NAME:-squirroflow-sub-queue}
            WORKER_CONCURRENCY: ${SUB_WORKER_CONCURRENCY:-2}
            REDIS_URL: redis://squirroflow-redis-sub:6379
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:${SUB_PORT:-3001}/api/v1/ping']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        entrypoint: /bin/sh -c "sleep 3; pnpm start"
        depends_on:
            - redis-sub
            - postgres
        networks:
            - squirroflow-sub-net

    squirroflow-sub-worker:
        image: ${SQUIRROFLOW_WORKER_IMAGE:-squirroflow-worker:latest}
        restart: always
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - squirroflow_data:/root/.flowise
        environment:
            <<: *shared-env
            WORKER_PORT: ${SUB_WORKER_PORT:-5567}
            APP_URL: http://squirroflow-sub-main:${SUB_PORT:-3001}
            QUEUE_NAME: ${SUB_QUEUE_NAME:-squirroflow-sub-queue}
            WORKER_CONCURRENCY: ${SUB_WORKER_CONCURRENCY:-2}
            REDIS_URL: redis://squirroflow-redis-sub:6379
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:${SUB_WORKER_PORT:-5567}/healthz']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        entrypoint: /bin/sh -c "node /app/healthcheck/healthcheck.js & sleep 5 && pnpm run start-worker"
        depends_on:
            - redis-sub
            - squirroflow-sub-main
        networks:
            - squirroflow-sub-net

volumes:
    squirroflow_data:
        # Reuse existing flowise_data volume to preserve chatflows, credentials, etc.
        # Create with: docker volume create squirroflow_data
        # Or to reuse an existing Flowise volume, set SQUIRROFLOW_DATA_VOLUME in .env
        name: ${SQUIRROFLOW_DATA_VOLUME:-squirroflow_data}
        external: true
    postgres_data:
        # To reuse an existing Postgres volume, set SQUIRROFLOW_POSTGRES_VOLUME in .env
        name: ${SQUIRROFLOW_POSTGRES_VOLUME:-squirroflow_postgres_data}
        external: ${SQUIRROFLOW_POSTGRES_EXTERNAL:-false}
    redis_orch_data:
        driver: local
    redis_sub_data:
        driver: local

networks:
    squirroflow-orch-net:
        driver: bridge
    squirroflow-sub-net:
        driver: bridge
